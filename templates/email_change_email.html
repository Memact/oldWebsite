<div style="margin:0; padding:0; background:#00011b;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#00011b; margin:0; padding:0;">
    <tr>
      <td align="center" style="padding:44px 18px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:640px; background:#101126; border:1px solid rgba(255,255,255,0.16); border-radius:30px;">
          <tr>
            <td style="padding:38px 32px 34px; font-family:'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; color:#ffffff; text-align:left;">

              <img
                src="https://goxfcdnpkglfcpeysevz.supabase.co/storage/v1/object/public/public-assets/text_logo_nobg.png"
                alt="Memact"
                width="156"
                style="display:block; width:156px; max-width:100%; height:auto; margin:0 0 34px 0; border:0; outline:none; text-decoration:none;"
              />

              <div style="margin:0 0 14px; color:rgba(255,255,255,0.48); font-size:12px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase;">
                Email update
              </div>

              <h1 style="margin:0 0 16px; font-size:34px; line-height:1.04; font-weight:800; letter-spacing:-0.045em; color:#ffffff;">
                Confirm your new email.
              </h1>

              <p style="margin:0 0 18px; color:rgba(255,255,255,0.68); font-size:17px; line-height:1.62; font-weight:500;">
                Confirm this change to update your Memact account email.
              </p>

              <p style="margin:0 0 28px; color:rgba(255,255,255,0.54); font-size:14px; line-height:1.65; font-weight:500;">
                Current email: {{ .Email }}<br>
                New email: {{ .NewEmail }}
              </p>

              <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 26px;">
                <tr>
                  <td align="center" bgcolor="#ffffff" style="border-radius:999px;">
                    <a
                      href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email_change"
                      style="display:inline-block; padding:15px 24px; font-family:'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; font-size:15px; font-weight:800; color:#00011b; text-decoration:none; border-radius:999px;"
                    >
                      Confirm email change
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:0; color:rgba(255,255,255,0.44); font-size:13px; line-height:1.6; font-weight:500;">
                If you did not request this change, you can safely ignore this email.
              </p>

            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</div>
